name: Build and Deploy mbot

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    ALIYUN_REGISTRY: crpi-o7hjr2799ziyel6t.cn-beijing.personal.cr.aliyuncs.com
    IMAGE_NAME: crpi-o7hjr2799ziyel6t.cn-beijing.personal.cr.aliyuncs.com/mbot_ssid/mbot-session

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: 检出代码
              uses: actions/checkout@v4

            - name: 登录阿里云容器镜像服务
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.ALIYUN_REGISTRY }}
                  username: ${{ secrets.ALIYUN_REGISTRY_USER }}
                  password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

            - name: 构建并推送镜像
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ env.IMAGE_NAME }}:latest

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push

        steps:
            - name: SSH 到服务器部署
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  port: ${{ secrets.SERVER_PORT }}
                  command_timeout: 20m
                  script: |
                      # 登录阿里云镜像服务
                      echo ${{ secrets.ALIYUN_REGISTRY_PASSWORD }} | docker login crpi-o7hjr2799ziyel6t.cn-beijing.personal.cr.aliyuncs.com -u ${{ secrets.ALIYUN_REGISTRY_USER }} --password-stdin

                      # 拉取最新镜像（国内网络，速度快）
                      docker pull crpi-o7hjr2799ziyel6t.cn-beijing.personal.cr.aliyuncs.com/mbot_ssid/mbot-session:latest

                      # 停止并删除旧容器
                      docker stop mbot || true
                      docker rm mbot || true

                      # 启动新容器
                      docker run -d \
                        --name mbot \
                        --restart unless-stopped \
                        -p 8000:8000 \
                        -e LLM_API_KEY=${{ secrets.LLM_API_KEY }} \
                        -v /home/${{ secrets.SERVER_USER }}/mbot-data/memory:/app/data/memory \
                        -v /home/${{ secrets.SERVER_USER }}/mbot-data/logs:/app/data/logs \
                        crpi-o7hjr2799ziyel6t.cn-beijing.personal.cr.aliyuncs.com/mbot_ssid/mbot-session:latest

                      # 清理旧镜像
                      docker image prune -f

